{% extends 'base.html' %}

{% block content %}
<div class="container" style="max-width: 500px; margin: 4rem auto; padding: 2rem;">
    <div class="glass-panel fade-in delay-1" style="padding: 3rem; text-align: center;">
        <div style="font-size: 3rem; margin-bottom: 1.5rem;">🔒</div>
        <h1 style="font-size: 1.8rem; margin-bottom: 0.5rem;">Admin Portal</h1>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">Please enter the management password to access the
            quiz review section.</p>

        <form method="POST" action="{% url 'learning:admin_login' %}">
            {% csrf_token %}
            {% if error %}
            <div
                style="background: rgba(239, 68, 68, 0.1); border: 1px solid var(--error); color: var(--error); padding: 0.75rem; border-radius: 8px; margin-bottom: 1.5rem; font-size: 0.9rem;">
                {{ error }}
            </div>
            {% endif %}

            <div style="margin-bottom: 1.5rem; text-align: left;">
                <label for="admin_password"
                    style="display: block; font-size: 0.85rem; margin-bottom: 0.5rem; color: var(--text-muted);">Portal
                    Password</label>
                <input type="password" id="admin_password" name="admin_password" required autofocus
                    style="width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: white; padding: 0.75rem; font-size: 1.1rem; outline: none; transition: border-color 0.2s;"
                    onfocus="this.style.borderColor='var(--primary)'"
                    onblur="this.style.borderColor='rgba(255,255,255,0.1)'">
            </div>

            <button type="submit" class="btn btn-primary"
                style="width: 100%; padding: 0.8rem; font-weight: 600; font-size: 1rem;">
                Unlock Portal
            </button>
        </form>

        <a href="{% url 'learning:dashboard' %}"
            style="display: inline-block; margin-top: 2rem; color: var(--text-muted); text-decoration: none; font-size: 0.9rem;">
            &larr; Back to Dashboard
        </a>
    </div>
</div>
{% endblock %}
